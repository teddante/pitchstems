name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed approach
      description: Describe the behavior or UI you would like.
