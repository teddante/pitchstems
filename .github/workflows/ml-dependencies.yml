name: ML Dependencies

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "constraints/**"
      - "scripts/setup-windows-gpu.ps1"
      - "scripts/ml_import_smoke.py"
      - ".github/workflows/ml-dependencies.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "constraints/**"
      - "scripts/setup-windows-gpu.ps1"
      - "scripts/ml_import_smoke.py"
      - ".github/workflows/ml-dependencies.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  cpu-extra-resolve:
    name: CPU ML extra resolves on Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU ML extra
        run: |
          python -m pip install -U pip
          python -m pip install -c constraints/windows-cpu.txt -e ".[cpu]"

      - name: Check installed metadata
        run: python -m pip check

      - name: Import ML packages
        run: python scripts/ml_import_smoke.py

  gpu-extra-resolves:
    name: GPU ML extra resolves
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install GPU constraints without hardware check
        run: |
          python -m pip install -U pip
          python -m pip install -c constraints/windows-gpu.txt -e ".[win-gpu]"
          python -m pip uninstall -y torch torchvision
          python -m pip install -c constraints/windows-gpu.txt torch torchvision --index-url https://download.pytorch.org/whl/cu126

      - name: Verify CUDA PyTorch wheel was selected
        run: python -c "import torch; assert '+cu' in torch.__version__, torch.__version__; print(torch.__version__)"

      - name: Check installed metadata
        run: python -m pip check
