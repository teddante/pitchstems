name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python checks
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install -U pip
          python -m pip install -c constraints/windows-dev.txt -e ".[dev,gui]"

      - name: Run project checks
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: .\scripts\check.ps1 -GuiSmoke -Build -SkipDoctor
