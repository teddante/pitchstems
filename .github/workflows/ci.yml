name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Windows Python ${{ matrix.python-version }} checks
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install -U pip
          python -m pip install -c constraints/windows-dev.txt -e ".[dev,gui]"

      - name: Run project checks
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: .\scripts\check.ps1 -GuiSmoke -Build -SkipDoctor

  macos-source:
    name: macOS source and GUI smoke
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install source and GUI checks
        run: |
          python -m pip install -U pip setuptools
          python -m pip install -e ".[dev,gui]"

      - name: Run source checks
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m ruff check src tests
          python -m mypy
          python -m pytest -q
          PITCHSTEMS_GUI_SMOKE=project python -m pitchstems.app
          python -m build
          python -m pip check
